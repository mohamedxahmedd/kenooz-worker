name: kenooz_worker_app
description: "Kenooz Worker desktop app for Windows and macOS."
publish_to: 'none'

version: 1.0.2+22

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  bloc: ^9.0.0
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8
  dio: ^5.3.3
  easy_localization: ^3.0.8
  equatable: ^2.0.5
  file_picker: ^10.2.0
  flutter_bloc: ^9.1.1
  flutter_easyloading: ^3.0.5
  flutter_screenutil: ^5.9.0
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.17
  freezed_annotation: ^3.1.0
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  http: ^1.4.0
  json_annotation: ^4.9.0
  open_file: ^3.5.10
  path_provider: ^2.1.5
  retrofit: ^4.9.2
  share_plus: ^10.1.4
  shared_preferences: ^2.3.3
  shimmer: ^3.0.0
  top_snackbar_flutter: ^3.2.0
  url_launcher: ^6.2.5
  window_manager: ^0.4.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.10
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  retrofit_generator: ^10.2.3

flutter:
